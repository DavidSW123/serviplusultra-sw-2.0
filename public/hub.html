<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServiPlusUltra</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1abc9c">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; }

        .hub-header { text-align: center; margin-bottom: 32px; }
        .hub-header img { width: clamp(100px, 30vw, 160px); margin-bottom: 14px; }
        .hub-header h1 { color: #2c3e50; font-size: clamp(1.2em, 5vw, 1.6em); }
        .hub-header p  { color: #7f8c8d; margin-top: 6px; font-size: clamp(0.85em, 3vw, 1em); }

        .hub-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; max-width: 820px; width: 100%; }

        .hub-card {
            background: white;
            border-radius: 12px;
            padding: clamp(20px, 4vw, 36px) clamp(14px, 3vw, 24px);
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
            border-top: 4px solid transparent;
        }
        .hub-card:hover, .hub-card:active { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.12); }
        .hub-card.contabilidad { border-color: #27ae60; }
        .hub-card.facturas     { border-color: #3498db; }
        .hub-card.presupuestos { border-color: #9b59b6; }

        .hub-card .icon  { font-size: clamp(2em, 5vw, 2.8em); margin-bottom: 12px; }
        .hub-card h2     { font-size: clamp(0.95em, 2.5vw, 1.15em); color: #2c3e50; margin-bottom: 6px; }
        .hub-card p      { font-size: clamp(0.78em, 2vw, 0.88em); color: #7f8c8d; line-height: 1.5; }

        .hub-user { position: fixed; top: 14px; right: 16px; font-size: 0.85em; color: #7f8c8d; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; max-width: 50vw; }
        .hub-user strong { color: #2c3e50; }
        .hub-user a { color: #e74c3c; text-decoration: none; font-size: 0.85em; white-space: nowrap; }

        @media (max-width: 600px) {
            .hub-grid { grid-template-columns: 1fr; max-width: 380px; }
            .hub-user { position: relative; top: auto; right: auto; margin-bottom: 12px; justify-content: center; max-width: 100%; }
            body { justify-content: flex-start; padding-top: 20px; }
        }
        @media (min-width: 601px) and (max-width: 800px) {
            .hub-grid { grid-template-columns: repeat(2, 1fr); max-width: 560px; }
            .hub-card.presupuestos { grid-column: 1 / -1; max-width: 260px; margin: 0 auto; width: 100%; }
        }
    </style>
</head>
<body>
    <div class="hub-user">
        Hola, <strong id="hubNombre"></strong>
        <a href="#" onclick="cerrarSesionHub()">Cerrar sesión</a>
    </div>

    <div class="hub-header">
        <img src="/logo.png" onerror="this.style.display='none'">
        <h1>ServiPlusUltra</h1>
        <p id="hubRol"></p>
    </div>

    <div class="hub-grid">
        <a class="hub-card contabilidad" href="/contabilidad">
            <div class="icon">📊</div>
            <h2>Contabilidad</h2>
            <p>Ingresos, costes, beneficios y evolución del negocio</p>
        </a>

        <a class="hub-card facturas" href="/facturas">
            <div class="icon">🛠️</div>
            <h2>Facturas & OTs</h2>
            <p>Órdenes de trabajo, materiales, clientes y facturación</p>
        </a>

        <a class="hub-card presupuestos" href="/presupuestos">
            <div class="icon">📋</div>
            <h2>Presupuestos</h2>
            <p>Generación y seguimiento de presupuestos para clientes</p>
        </a>
    </div>

    <script>
        const sesionStr = localStorage.getItem('sesionPlusUltra');
        if (!sesionStr) window.location.href = '/login';
        const sesion = JSON.parse(sesionStr);
        document.getElementById('hubNombre').innerText = sesion.username;
        document.getElementById('hubRol').innerText    = sesion.rol.charAt(0).toUpperCase() + sesion.rol.slice(1);
        function cerrarSesionHub() { localStorage.removeItem('sesionPlusUltra'); window.location.href = '/login'; }
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
    </script>
</body>
</html>
